<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drone Telemetry</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

    <a class="btn btn-secondary mb-3" href="/">Go Back</a>

    <h1>Drone Telemetry</h1>

    <div class="card mt-4">
        <div class="card-body">
            <p><strong>Latitude:</strong> <span id="lat">--</span></p>
            <p><strong>Longitude:</strong> <span id="lon">--</span></p>
            <p><strong>Height:</strong> <span id="height">--</span></p>
            <p><strong>Heading:</strong> <span id="head">--</span></p>
            <p><strong>Pitch:</strong> <span id="pitch">--</span></p>
            <p><strong>Roll:</strong> <span id="roll">--</span></p>
            <p><strong>Battery:</strong> <span id="battery">--</span>%</p>
        </div>
    </div>

<script>
    async function loadTelemetry() {
        try {
            const response = await fetch('/api/telemetry');
            const data = await response.json();

            if (data.status) return;

            document.getElementById('lat').textContent = data.latitude ?? "--";
            document.getElementById('lon').textContent = data.longitude ?? "--";
            document.getElementById('height').textContent = data.height ?? "--";
            document.getElementById('head').textContent = data.attitude_head ?? "--";
            document.getElementById('pitch').textContent = data.attitude_pitch ?? "--";
            document.getElementById('roll').textContent = data.attitude_roll ?? "--";
            document.getElementById('battery').textContent = data.battery_percent ?? "--";

        } catch (error) {
            console.error("Error fetching telemetry:", error);
        }
    }

    // Update every 1 second
    setInterval(loadTelemetry, 1000);
    loadTelemetry();
</script>

</body>
</html>
