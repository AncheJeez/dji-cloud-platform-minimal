<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DJI Cloud API Streaming</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
    crossorigin="anonymous"
  />
  <style>
    body {
      background: #0f1115;
      color: #fff;
      min-height: 100vh;
    }
    .stream-card {
      background: #1a1d24;
      border: 1px solid #2a2f3a;
    }
    video {
      width: 100%;
      border-radius: 0.5rem;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="text-center mb-4">
      <h1 class="fw-light">DRONE STREAMING LOCAL</h1>
      <p class="text-secondary">Streaming HLS (.m3u8)</p>
    </div>

    <div class="card stream-card shadow-lg">
      <div class="card-body">
        <video id="video" controls autoplay muted></video>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script type="module" src="../scripts/hls.ts"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
</body>
</html>
